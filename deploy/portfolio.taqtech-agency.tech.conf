# Front-proxy server block for the portfolio.
# Place at /etc/nginx/sites-available/portfolio.taqtech-agency.tech.conf
# then symlink into sites-enabled. certbot --nginx will inject the
# listen 443 / ssl_certificate lines automatically on first run.
server {
    listen 80;
    listen [::]:80;
    server_name portfolio.taqtech-agency.tech;

    # Proxy to the localhost-bound portfolio container (HOST_PORT=8080)
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
