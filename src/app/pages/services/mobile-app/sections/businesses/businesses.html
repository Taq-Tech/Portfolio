<section class="ma-businesses">

  <!-- Background -->
  <img class="ma-businesses__bg" src="/about-hero-bg.png" alt="" aria-hidden="true" />

  <div class="ma-businesses__inner">

    <h2 class="ma-businesses__title" scrollAnimate="fade-up">
      <span class="ma-businesses__gradient-text">
        See What Other Businesses Achieved With It
      </span>
    </h2>

    <div class="ma-businesses__grid">

      <!-- Alpha Academy -->
      <a routerLink="/services/mobile-app/alpha-academy" class="ma-biz-card ma-biz-card--alpha" scrollAnimate="fade-up" [animDelay]="100">
        <img class="ma-biz-card__img" src="/Mobile%20Development/Alpha_Academy/Alpha_Academy_Logo.jpeg" alt="Alpha Academy logo" />
        <div class="ma-biz-card__overlay">
          <header class="ma-biz-card__head">
            <h3 class="ma-biz-card__name">Alpha Academy</h3>
          </header>
          <div class="ma-biz-card__tags">
            <span class="ma-biz-tag">Mobile App</span>
          </div>
        </div>
      </a>

      <!-- Pillpal -->
      <a routerLink="/services/mobile-app/pillpal" class="ma-biz-card ma-biz-card--pillpal" scrollAnimate="fade-up" [animDelay]="200">
        <div class="ma-biz-card__placeholder" aria-hidden="true">
          <svg width="64" height="64" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 8L8 20C4.686 23.314 4.686 28.686 8 32L16 40C19.314 43.314 24.686 43.314 28 40L40 28C43.314 24.686 43.314 19.314 40 16L32 8C28.686 4.686 23.314 4.686 20 8Z" stroke="url(#ppCardGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 14L34 34" stroke="url(#ppCardGrad)" stroke-width="3" stroke-linecap="round"/>
            <defs>
              <linearGradient id="ppCardGrad" x1="4" y1="4" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4CB8FF"/>
                <stop offset="1" stop-color="#9B2FFF"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="ma-biz-card__overlay">
          <header class="ma-biz-card__head">
            <h3 class="ma-biz-card__name">Pillpal</h3>
          </header>
          <div class="ma-biz-card__tags">
            <span class="ma-biz-tag">Mobile App</span>
          </div>
        </div>
      </a>

    </div>

    <a href="#" class="ma-businesses__cta">
      See Case Studies
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </div>

</section>
