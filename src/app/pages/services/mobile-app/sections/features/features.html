<section class="ma-features">

  <!-- Background -->
  <img class="ma-features__bg" src="/NUMBERS THAT MATTER.png" alt="" aria-hidden="true" />

  <div class="ma-features__inner">

    <h2 class="ma-features__title" scrollAnimate="fade-up">
      <span class="ma-features__gradient-text">
        What You Get with Our Mobile App Development Services
      </span>
    </h2>

    <div class="ma-features__content">

      <!-- Left: device mockup -->
      <div class="ma-features__visual" scrollAnimate="fade-right">
        <img src="/web_dev.png" alt="Mobile app development showcase" />
      </div>

      <!-- Right: bullet list -->
      <ul class="ma-features__list">
        <li class="ma-features__item" scrollAnimate="fade-left" [animDelay]="150">
          <svg class="ma-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#maCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="maCheck" x1="4" y1="11.5" x2="18" y2="11.5" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4CB8FF"/>
                <stop offset="1" stop-color="#9B2FFF"/>
              </linearGradient>
            </defs>
          </svg>
          <span>Custom iOS and Android application development</span>
        </li>
        <li class="ma-features__item" scrollAnimate="fade-left" [animDelay]="250">
          <svg class="ma-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#maCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Cross-platform mobile app solutions</span>
        </li>
        <li class="ma-features__item" scrollAnimate="fade-left" [animDelay]="350">
          <svg class="ma-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#maCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Backend and API integration</span>
        </li>
        <li class="ma-features__item" scrollAnimate="fade-left" [animDelay]="450">
          <svg class="ma-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#maCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Performance optimization and scalability</span>
        </li>
        <li class="ma-features__item" scrollAnimate="fade-left" [animDelay]="550">
          <svg class="ma-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#maCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>App store deployment and support</span>
        </li>
      </ul>

    </div>

  </div>

</section>
