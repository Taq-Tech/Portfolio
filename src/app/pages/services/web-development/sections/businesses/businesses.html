<section class="wd-businesses">

  <!-- Background -->
  <img class="wd-businesses__bg" src="/about-hero-bg.png" alt="" aria-hidden="true" />

  <div class="wd-businesses__inner">

    <h2 class="wd-businesses__title" scrollAnimate="fade-up">
      <span class="wd-businesses__gradient-text">
        See What Other Businesses Achieved With It
      </span>
    </h2>

    <div class="wd-businesses__grid">

      <!-- Qreate -->
      <a routerLink="/services/web-development/qreate" class="wd-biz-card wd-biz-card--qreate" scrollAnimate="fade-up" [animDelay]="100">
        <img class="wd-biz-card__img" src="/Web%20Development/Qreate/Qreate.png" alt="Qreate project" />
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">Qreate</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

      <!-- PromptOverflow -->
      <a routerLink="/services/web-development/promptoverflow" class="wd-biz-card wd-biz-card--promptoverflow" scrollAnimate="fade-up" [animDelay]="200">
        <img class="wd-biz-card__img" src="/Web%20Development/PromptOverflow/PromptOverflow.png" alt="PromptOverflow project" />
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">PromptOverflow</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

      <!-- Invoices Management System -->
      <a routerLink="/services/web-development/invoices-system" class="wd-biz-card wd-biz-card--invoices" scrollAnimate="fade-up" [animDelay]="300">
        <div class="wd-biz-card__art" aria-hidden="true">
          <svg class="wd-biz-card__art-glow" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="ivGlowA" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#4CB8FF" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#4CB8FF" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="ivGlowB" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#9B2FFF" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#9B2FFF" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <circle cx="60" cy="80" r="90" fill="url(#ivGlowA)"/>
            <circle cx="190" cy="170" r="90" fill="url(#ivGlowB)"/>
          </svg>
          <svg class="wd-biz-card__art-icon" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="ivStroke" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4CB8FF"/>
                <stop offset="100%" stop-color="#9B2FFF"/>
              </linearGradient>
              <linearGradient id="ivBadge" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1D5AF0"/>
                <stop offset="100%" stop-color="#8E2DF5"/>
              </linearGradient>
            </defs>
            <rect x="22" y="14" width="80" height="110" rx="10" fill="url(#ivStroke)" opacity="0.18"/>
            <path d="M14 18 H78 L102 42 V126 a8 8 0 0 1 -8 8 H14 a8 8 0 0 1 -8 -8 V26 a8 8 0 0 1 8 -8 Z"
                  fill="#0e0a28" stroke="url(#ivStroke)" stroke-width="2"/>
            <path d="M78 18 V42 H102 Z" fill="url(#ivStroke)" opacity="0.5"/>
            <rect x="22" y="56" width="34" height="6" rx="3" fill="url(#ivStroke)"/>
            <rect x="22" y="72" width="64" height="4" rx="2" fill="#b8c1ec" opacity="0.7"/>
            <rect x="22" y="84" width="64" height="4" rx="2" fill="#b8c1ec" opacity="0.55"/>
            <rect x="22" y="96" width="44" height="4" rx="2" fill="#b8c1ec" opacity="0.4"/>
            <rect x="22" y="110" width="36" height="14" rx="7" fill="url(#ivBadge)"/>
            <text x="40" y="120.5" text-anchor="middle" font-family="'Clash Display', sans-serif" font-weight="700" font-size="8" letter-spacing="0.6" fill="#fff">PAID</text>
            <circle cx="92" cy="116" r="14" fill="url(#ivBadge)"/>
            <path d="M86 116 L91 121 L99 112" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">Invoices Management System</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

      <!-- School Management System -->
      <a routerLink="/services/web-development/school-management-system" class="wd-biz-card wd-biz-card--sms" scrollAnimate="fade-up" [animDelay]="400">
        <div class="wd-biz-card__art" aria-hidden="true">
          <svg class="wd-biz-card__art-glow" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="smsGlowA" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#4CB8FF" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#4CB8FF" stop-opacity="0"/>
              </radialGradient>
              <radialGradient id="smsGlowB" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#9B2FFF" stop-opacity="0.55"/>
                <stop offset="100%" stop-color="#9B2FFF" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <circle cx="60" cy="80" r="90" fill="url(#smsGlowA)"/>
            <circle cx="190" cy="170" r="90" fill="url(#smsGlowB)"/>
          </svg>
          <svg class="wd-biz-card__art-icon" viewBox="0 0 120 110" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="smsCardStroke" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#4CB8FF"/>
                <stop offset="100%" stop-color="#9B2FFF"/>
              </linearGradient>
              <linearGradient id="smsCardCap" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#1D5AF0"/>
                <stop offset="100%" stop-color="#8E2DF5"/>
              </linearGradient>
            </defs>
            <path d="M60 12 L112 38 L60 64 L8 38 Z" fill="url(#smsCardCap)" stroke="url(#smsCardStroke)" stroke-width="1.6" stroke-linejoin="round"/>
            <circle cx="60" cy="38" r="3" fill="#0e0a28"/>
            <path d="M60 38 L94 54 L94 80" stroke="url(#smsCardStroke)" stroke-width="2" stroke-linecap="round" fill="none"/>
            <circle cx="94" cy="84" r="5" fill="url(#smsCardStroke)"/>
            <path d="M30 50 L60 65 L90 50 L90 76 Q60 90 30 76 Z" fill="#0e0a28" stroke="url(#smsCardStroke)" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M30 76 Q60 90 90 76" fill="none" stroke="url(#smsCardStroke)" stroke-width="1" opacity="0.45"/>
          </svg>
        </div>
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">School Management System</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

    </div>

    <a href="#" class="wd-businesses__cta">
      See Case Studies
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </div>

</section>
