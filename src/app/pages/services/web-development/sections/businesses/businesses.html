<section class="wd-businesses">

  <!-- Background -->
  <img class="wd-businesses__bg" src="/about-hero-bg.png" alt="" aria-hidden="true" />

  <div class="wd-businesses__inner">

    <h2 class="wd-businesses__title" scrollAnimate="fade-up">
      <span class="wd-businesses__gradient-text">
        See What Other Businesses Achieved With It
      </span>
    </h2>

    <div class="wd-businesses__grid">

      <!-- Qreate -->
      <a routerLink="/services/web-development/qreate" class="wd-biz-card wd-biz-card--qreate" scrollAnimate="fade-up" [animDelay]="100">
        <img class="wd-biz-card__img" src="/Web%20Development/Qreate/Qreate.png" alt="Qreate project" />
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">Qreate</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

      <!-- PromptOverflow -->
      <a routerLink="/services/web-development/promptoverflow" class="wd-biz-card wd-biz-card--promptoverflow" scrollAnimate="fade-up" [animDelay]="200">
        <img class="wd-biz-card__img" src="/Web%20Development/PromptOverflow/PromptOverflow.png" alt="PromptOverflow project" />
        <div class="wd-biz-card__overlay">
          <header class="wd-biz-card__head">
            <h3 class="wd-biz-card__name">PromptOverflow</h3>
          </header>
          <div class="wd-biz-card__tags">
            <span class="wd-biz-tag">Website</span>
          </div>
        </div>
      </a>

    </div>

    <a href="#" class="wd-businesses__cta">
      See Case Studies
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 3.5L10.5 8L6 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

  </div>

</section>
