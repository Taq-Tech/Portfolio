<section class="wd-hero">

  <!-- Background image + darkening overlays -->
  <div class="wd-hero__bg" aria-hidden="true">
    <img class="wd-hero__bg-img" src="/web-dev-hero-bg.png" alt="" />
    <div class="wd-hero__bg-tint"></div>
    <div class="wd-hero__bg-vignette"></div>
  </div>

  <!-- Content -->
  <div class="wd-hero__inner">

    <h1 class="wd-hero__headline" scrollAnimate="fade-up">
      <span class="wd-hero__gradient-text">
        Custom Web Development Services for Scalable Digital Platforms
      </span>
    </h1>

    <p class="wd-hero__subtext" scrollAnimate="fade-up" [animDelay]="120">
      We build high-performance, secure, and scalable web applications tailored to your business needs.
    </p>

    <div class="wd-hero__actions" scrollAnimate="fade-up" [animDelay]="220">
      <button class="wd-btn wd-btn--primary">Book a Strategy Session</button>
      <button class="wd-btn wd-btn--outline">Explore Our Services</button>
    </div>

  </div>

  <!-- Scroll-down chevron -->
  <div class="wd-hero__chevron" aria-hidden="true">
    <svg width="48" height="42" viewBox="0 0 48 42" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4L24 22L44 4" stroke="url(#wdChev1)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <path opacity="0.6" d="M4 20L24 38L44 20" stroke="url(#wdChev2)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <defs>
        <linearGradient id="wdChev1" x1="4" y1="13" x2="44" y2="13" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4CB8FF"/>
          <stop offset="1" stop-color="#9B2FFF"/>
        </linearGradient>
        <linearGradient id="wdChev2" x1="4" y1="29" x2="44" y2="29" gradientUnits="userSpaceOnUse">
          <stop stop-color="#4CB8FF"/>
          <stop offset="1" stop-color="#9B2FFF"/>
        </linearGradient>
      </defs>
    </svg>
  </div>

</section>
