<section class="wd-features">

  <!-- Background -->
  <img class="wd-features__bg" src="/NUMBERS THAT MATTER.png" alt="" aria-hidden="true" />

  <div class="wd-features__inner">

    <h2 class="wd-features__title" scrollAnimate="fade-up">
      <span class="wd-features__gradient-text">
        What You Get with Our Web Development Services
      </span>
    </h2>

    <div class="wd-features__content">

      <!-- Left: device mockup -->
      <div class="wd-features__visual" scrollAnimate="fade-right">
        <img src="/web_dev.png" alt="Web development showcase" />
      </div>

      <!-- Right: bullet list -->
      <ul class="wd-features__list">
        <li class="wd-features__item" scrollAnimate="fade-left" [animDelay]="150">
          <svg class="wd-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#wdCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="wdCheck" x1="4" y1="11.5" x2="18" y2="11.5" gradientUnits="userSpaceOnUse">
                <stop stop-color="#4CB8FF"/>
                <stop offset="1" stop-color="#9B2FFF"/>
              </linearGradient>
            </defs>
          </svg>
          <span>CMS and admin dashboard solutions</span>
        </li>
        <li class="wd-features__item" scrollAnimate="fade-left" [animDelay]="250">
          <svg class="wd-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#wdCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>SEO-optimized and high-performance structure</span>
        </li>
        <li class="wd-features__item" scrollAnimate="fade-left" [animDelay]="350">
          <svg class="wd-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#wdCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Custom web application development</span>
        </li>
        <li class="wd-features__item" scrollAnimate="fade-left" [animDelay]="450">
          <svg class="wd-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#wdCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Scalable frontend and backend architecture</span>
        </li>
        <li class="wd-features__item" scrollAnimate="fade-left" [animDelay]="550">
          <svg class="wd-features__check" width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 11.5L9 16.5L18 6.5" stroke="url(#wdCheck)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>API development and third-party integrations</span>
        </li>
      </ul>

    </div>

  </div>

</section>
