<section class="services">

  <!-- Radial dot grid background -->
  <div class="services__bg" aria-hidden="true"></div>

  <!-- Section header -->
  <div class="services__header">
    <div class="section-label">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="filter: drop-shadow(0 0 3px #a100ff)">
        <circle cx="24" cy="24" r="12" stroke="url(#sg)" stroke-width="2"/>
        <path d="M17 24h14M24 17v14" stroke="url(#sg2)" stroke-width="2" stroke-linecap="round"/>
        <defs>
          <linearGradient id="sg" x1="12" y1="24" x2="36" y2="24" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1797ff"/><stop offset="1" stop-color="#9723ea"/>
          </linearGradient>
          <linearGradient id="sg2" x1="24" y1="12" x2="24" y2="36" gradientUnits="userSpaceOnUse">
            <stop stop-color="#1797ff"/><stop offset="1" stop-color="#9723ea"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="section-label__text">Our Core Services</span>
    </div>
    <p class="services__subtitle">
      We've got the Right Hands — from Strategy to Deployment
    </p>
  </div>

  <!-- Service cards -->
  <div class="services__cards">

    <div class="service-card">
      <div class="service-card__icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">

            <linearGradient id="sc1" x1="4" y1="20" x2="36" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1797ff"/><stop offset="1" stop-color="#9723ea"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h3 class="service-card__title">Tech Consulting</h3>
    </div>

    <div class="service-card">
      <div class="service-card__icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="6" width="28" height="28" rx="4" stroke="url(#sc2)" stroke-width="2"/>
          <circle cx="20" cy="20" r="6" stroke="url(#sc2)" stroke-width="2"/>
          <path d="M20 6v4M20 30v4M6 20h4M30 20h4" stroke="url(#sc2)" stroke-width="2" stroke-linecap="round"/>

          </defs>
        </svg>
      </div>
      <h3 class="service-card__title">UX Design</h3>
    </div>

    <div class="service-card">
      <div class="service-card__icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 10l8 10-8 10" stroke="url(#sc3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 30h16" stroke="url(#sc3)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="sc3" x1="6" y1="20" x2="34" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1797ff"/><stop offset="1" stop-color="#9723ea"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h3 class="service-card__title">Web Development</h3>
    </div>

    <div class="service-card">
      <div class="service-card__icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="12" y="4" width="16" height="32" rx="3" stroke="url(#sc4)" stroke-width="2"/>
          <circle cx="20" cy="31" r="1.5" fill="url(#sc4)"/>
          <path d="M16 8h8" stroke="url(#sc4)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="sc4" x1="12" y1="20" x2="28" y2="20" gradientUnits="userSpaceOnUse">
              <stop stop-color="#1797ff"/><stop offset="1" stop-color="#9723ea"/>

</section>
