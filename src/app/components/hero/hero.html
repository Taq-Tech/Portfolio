<section class="hero">

  <!-- Background texture + gradient overlay -->
  <div class="hero__bg" aria-hidden="true">
    <img class="hero__bg-img" src="/hero-bg.png" alt="" />
    <div class="hero__bg-gradient"></div>
  </div>

  <!-- Content row -->
  <div class="hero__inner">

    <!-- Left: text + buttons -->
    <div class="hero__left">
      <h1 class="hero__headline">
        Strategic
        <span class="hero__gradient-text"> Technology </span>
        That Drives Real Business
        <span class="hero__gradient-text"> Growth</span>
      </h1>

      <p class="hero__subtext">
        We design and build scalable SaaS platforms, enterprise systems, and high-performance applications.
      </p>

      <div class="hero__actions">
        <button class="btn btn--primary">Book a Strategy Session</button>
        <button class="btn btn--outline">Explore Our Services</button>
      </div>
    </div>

    <!-- Right: globe -->
    <div class="hero__globe">
      <img src="/globe.png" alt="Globe" />
    </div>

  </div>
</section>
