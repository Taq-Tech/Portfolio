<section
  class="portfolio-work"
  [class.portfolio-work--consulting]="variant() === 'consulting'"
>

  <div class="portfolio-work__bg" aria-hidden="true"></div>
  <div class="portfolio-work__overlay" aria-hidden="true"></div>

  <h2 class="portfolio-work__title" scrollAnimate="fade-up">{{ title() }}</h2>

  <div class="portfolio-work__carousel" scrollAnimate="fade-up" [animDelay]="150">
    <div class="portfolio-work__viewport">
      <div
        class="portfolio-work__track"
        [style.transform]="trackTransform()"
        role="region"
        aria-roledescription="carousel"
        [attr.aria-label]="title() + ', slide ' + (active() + 1) + ' of ' + slideCount()"
      >
        @for (slide of slides(); track $index) {
          <div class="portfolio-work__slide" [attr.aria-hidden]="active() !== $index">
            @for (card of slide; track card.id) {
              <article class="pw-card">
                <img
                  class="pw-card__img"
                  [src]="card.image"
                  [alt]="card.title + ' project'"
                  loading="lazy"
                />
              </article>
            }
          </div>
        }
      </div>
    </div>

    <div class="portfolio-work__controls">
      <button type="button" class="pw-arrow" (click)="prev()" aria-label="Previous slide">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path [attr.stroke]="'url(#pw_arr_l_' + variant() + ')'" d="M15 5L9 12L15 19" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient [attr.id]="'pw_arr_l_' + variant()" x1="15" y1="12" x2="9" y2="12" gradientUnits="userSpaceOnUse">
              <stop stop-color="#9723EA"/><stop offset="1" stop-color="#1797FF"/>
            </linearGradient>
          </defs>
        </svg>
      </button>

      <div class="pw-dots">
        @for (i of dotIndices(); track i) {
          <button
            type="button"
            class="pw-dot"
            (click)="goTo(i)"
            [attr.aria-label]="'Go to slide ' + (i + 1)"
            [attr.aria-current]="active() === i ? 'true' : null"
          >
            @if (active() === i) {
              <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="8" [attr.fill]="'url(#pw_dot_active_' + variant() + ')'"/>
                <defs>
                  <linearGradient [attr.id]="'pw_dot_active_' + variant()" x1="19" y1="11" x2="3" y2="11" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#9723EA"/><stop offset="1" stop-color="#1797FF"/>
                  </linearGradient>
                </defs>
              </svg>
            } @else {
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" aria-hidden="true">
                <circle cx="5" cy="5" r="4" fill="rgba(255,255,255,0.22)"/>
              </svg>
            }
          </button>
        }
      </div>

      <button type="button" class="pw-arrow" (click)="next()" aria-label="Next slide">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path [attr.stroke]="'url(#pw_arr_r_' + variant() + ')'" d="M9 19L15 12L9 5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <defs>
            <linearGradient [attr.id]="'pw_arr_r_' + variant()" x1="15" y1="12" x2="9" y2="12" gradientUnits="userSpaceOnUse">
              <stop stop-color="#9723EA"/><stop offset="1" stop-color="#1797FF"/>
            </linearGradient>
          </defs>
        </svg>
      </button>
    </div>
  </div>

</section>
