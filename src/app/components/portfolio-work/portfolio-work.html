<section
  class="portfolio-work"
  [class.portfolio-work--mobile]="variant() === 'mobile'"
>

  <div class="portfolio-work__bg" aria-hidden="true"></div>
  <div class="portfolio-work__overlay" aria-hidden="true"></div>

  <h2 class="portfolio-work__title" scrollAnimate="fade-up">{{ title() }}</h2>

  <div class="portfolio-work__grid" scrollAnimate="fade-up" [animDelay]="150">
    @for (card of cards(); track card.id; let i = $index) {
      <a
        [routerLink]="card.route"
        class="pw-card"
        [style.--pw-index]="i"
      >
        @if (card.logo) {
          <span class="pw-card__logo">
            <img [src]="card.logo" [alt]="card.title + ' logo'" loading="lazy" />
          </span>
        } @else {
          <span class="pw-card__logo pw-card__logo--text">{{ card.title.charAt(0) }}</span>
        }

        <h3 class="pw-card__title">{{ card.title }}</h3>
        <p class="pw-card__kicker">{{ card.kicker }}</p>

        <div class="pw-card__tags">
          @for (tag of card.tags; track tag) {
            <span class="pw-card__tag">{{ tag }}</span>
          }
        </div>

        <span class="pw-card__cta">
          View Project
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
            <path d="M3 7H11M11 7L7.5 3.5M11 7L7.5 10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
      </a>
    }
  </div>

</section>
